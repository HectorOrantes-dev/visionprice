name: vision_price
description: VisionPrice - Escaneo 3D y presupuestos para construcción en México
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Dependency Injection
  get_it: ^7.6.7
  injectable: ^2.4.4

  # Networking
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1

  # Secure Storage
  flutter_secure_storage: ^9.0.0

  # Local cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Biometrics
  local_auth: ^2.3.0

  # PDF Export
  pdf: ^3.10.8
  printing: ^5.13.0
  path_provider: ^2.1.3

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  lottie: ^3.1.2
  shimmer: ^3.0.0

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  uuid: ^4.4.0
  provider: ^6.1.5+1
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  flutter_local_notifications: ^22.0.1
  shared_preferences: ^2.5.5
  permission_handler: ^12.0.3
  geolocator: ^14.0.2
  safe_device: ^1.3.10
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  # Versiones compatibles entre sí
  riverpod_generator: ^2.3.9
  injectable_generator: ^2.6.2
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
