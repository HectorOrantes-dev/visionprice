name: visionprice
description: VisionPrice - Presupuestos de construcción inteligentes
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  http: ^1.6.0
  pdf: ^3.10.8
  printing: ^5.13.0
  path_provider: ^2.1.3
  record: ^7.1.1
  screen_protector: ^1.5.2
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  equatable: ^2.0.5
  uuid: ^4.4.0
  safe_device: ^1.3.10
  geolocator: ">=14.0.0 <14.0.3"
  permission_handler: ^12.0.1
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.3
  sqflite: ^2.4.3
  path: ^1.9.1
  dio: ^5.10.0
  connectivity_plus: ^7.2.0
  audioplayers: ^6.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.6.1
  flutter_launcher_icons: ^0.14.1

# Ícono del launcher (VP). Generar con:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo/icon_1024.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1D4ED8"
  adaptive_icon_foreground: "assets/logo/icon_foreground_1024.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo/
