name: visionprice
description: VisionPrice - Presupuestos de construcción inteligentes
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.5

  # Dependency Injection (automated)
  get_it: ^7.6.7
  injectable: ^2.4.4

  # Networking
  http: ^1.6.0

  # PDF Export
  pdf: ^3.10.8
  printing: ^5.13.0
  path_provider: ^2.1.3

  # Audio recording (captura del audio del maestro de obra).
  # record 7.x usa la generación 2.x de implementaciones (record_linux 2.x sí
  # implementa la interfaz); las 5.x arrastraban record_linux 0.7.2, incompatible
  # con la interfaz nueva, y rompían el compilado en máquinas Linux.
  record: ^7.0.0

  # UI
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.5
  uuid: ^4.4.0

  # Seguridad (RASP + Anti Fake-GPS + datos sensibles)
  safe_device: ^1.3.10
  geolocator: ">=14.0.0 <14.0.3"
  permission_handler: ^12.0.1
  shared_preferences: ^2.3.2

  # Notificaciones push (FCM + señal WIPE_DATA)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.9
  injectable_generator: ^2.6.2
  flutter_launcher_icons: ^0.14.1

# Ícono del launcher (VP). Generar con:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo/icon_1024.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1D4ED8"
  adaptive_icon_foreground: "assets/logo/icon_foreground_1024.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo/
