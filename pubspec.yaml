name: visionprice
description: VisionPrice - Presupuestos de construcción inteligentes
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3
  http: ^1.6.0
  pdf: ^3.10.8
  printing: ^5.13.0
  path_provider: ^2.1.3
  record: ^7.1.1
  screen_protector: ^1.5.2
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  equatable: ^2.0.5
  uuid: ^4.4.0
  geolocator: ">=14.0.0 <14.0.3"
  permission_handler: ^12.0.1
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^10.3.1
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.3
  sqflite: ^2.4.3
  path: ^1.9.1
  dio: ^5.10.0
  connectivity_plus: ^7.2.0
  audioplayers: ^6.8.1
  dartz: ^0.10.1
  webview_flutter: ^4.10.0
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^4.0.4
  flutter_launcher_icons: ^0.14.1

# package_info_plus llega transitivo vía geolocator_linux en 9.0.1 y aplica el
# Kotlin Gradle Plugin "a mano" (warning de Flutter sobre Built-in Kotlin en
# Android). La 10.2.1 ya no lo aplica ella misma — pero asume que el AGP del
# proyecto (9+) provee Kotlin integrado. Este proyecto sigue en AGP 8.11.1
# (sin Built-in Kotlin), y con esa combinación el plugin no compila
# ("cannot find symbol: class PackageInfoPlugin"). Se queda en 9.0.1 hasta
# subir el proyecto a AGP 9+.

# Ícono del launcher (VP). Generar con:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo/icon_1024.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1D4ED8"
  adaptive_icon_foreground: "assets/logo/icon_foreground_1024.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo/
    - assets/pagos/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter.ttf
    - family: HankenGrotesk
      fonts:
        - asset: assets/fonts/HankenGrotesk.ttf
