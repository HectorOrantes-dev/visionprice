name: vision_price
description: VisionPrice - Presupuestos de construcción inteligentes
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.5

  # Dependency Injection (automated)
  get_it: ^7.6.7
  injectable: ^2.4.4

  # Networking
  http: ^1.6.0

  # PDF Export
  pdf: ^3.10.8
  printing: ^5.13.0
  path_provider: ^2.1.3

  # UI
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.5
  uuid: ^4.4.0

  # Seguridad (RASP + Anti Fake-GPS + datos sensibles)
  safe_device: ^1.3.10
  geolocator: ">=14.0.0 <14.0.3"
  permission_handler: ^12.0.1
  shared_preferences: ^2.3.2

  # Notificaciones push (FCM + señal WIPE_DATA)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.9
  injectable_generator: ^2.6.2

flutter:
  uses-material-design: true
